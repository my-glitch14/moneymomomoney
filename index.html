<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="money.log">
<meta name="theme-color" content="#1a1916">
<title>money.log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f3ee;color:#1a1916;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--surface3:#e8e4db;
  --border:rgba(26,25,22,.1);--border2:rgba(26,25,22,.18);
  --text:#1a1916;--text2:#5c5a56;--text3:#9e9b95;
  --accent:#1d4ed8;--accent-lt:#dbeafe;
  --green:#15803d;--green-lt:#dcfce7;
  --red:#b91c1c;--red-lt:#fee2e2;
  --amber:#b45309;--amber-lt:#fef3c7;
  --purple:#6d28d9;--purple-lt:#ede9fe;
  --mono:'DM Mono',monospace;--r:10px;--r-lg:16px;--r-xl:20px;
  --sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom)
}
/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;min-height:100dvh}
#topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;padding-top:var(--sat);display:flex;align-items:center;justify-content:space-between;height:calc(52px + var(--sat))}
.topbar-logo{font-family:var(--mono);font-size:16px;font-weight:500}
.topbar-logo span{color:var(--accent)}
#main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(76px + var(--sab));-webkit-overflow-scrolling:touch}
.page{display:none;padding:14px}
.page.active{display:block}
/* ===== BOTTOM NAV ===== */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--sab)}
.bnav{display:flex;align-items:stretch;height:58px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;font-family:'Noto Sans JP';transition:color .15s}
.ni.active{color:var(--accent)}
.ni-icon{font-size:19px;line-height:1}
.ni.center{flex:0 0 68px}
.ni.center .circle{width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(29,78,216,.35);transition:transform .1s}
.ni.center:active .circle{transform:scale(.93)}
/* ===== DESKTOP SIDEBAR ===== */
#sidebar{display:none}
@media(min-width:600px){
  body{background:#ebe8e0}
  #app{flex-direction:row;max-width:1060px;margin:0 auto;min-height:100vh}
  #topbar{display:none!important}
  #sidebar{width:210px;flex-shrink:0;position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex!important;flex-direction:column;padding:20px 0}
  .sl{font-family:var(--mono);font-size:17px;font-weight:500;padding:0 18px 20px}
  .sl span{color:var(--accent)}
  .snav{display:flex;flex-direction:column;gap:2px;padding:0 8px}
  .si{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);border:none;background:none;font-size:13px;font-weight:500;font-family:'Noto Sans JP';color:var(--text2);cursor:pointer;transition:all .15s;text-align:left;width:100%}
  .si:hover{background:var(--surface2);color:var(--text)}
  .si.active{background:var(--accent-lt);color:var(--accent)}
  .si-icon{font-size:16px;width:22px;text-align:center}
  .sfooter{margin-top:auto;padding:0 8px}
  #main-content{flex:1;overflow-y:auto;padding-bottom:0}
  .page{padding:22px;max-width:660px}
  #bottom-nav{display:none!important}
}
/* ===== CARDS ===== */
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:15px;margin-bottom:11px}
.clabel{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px}
/* ===== HERO ===== */
.hero{background:var(--text);color:#fff;border-radius:var(--r-xl);padding:18px;margin-bottom:11px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-lbl{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:5px;letter-spacing:.06em}
.hero-amt{font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-.02em;line-height:1.1}
.hero-row{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)}
.hero-item{flex:1}
.hero-item-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:2px}
.hero-item-val{font-family:var(--mono);font-size:13px;font-weight:500}
.hv-plus{color:#4ade80}.hv-minus{color:#f87171}.hv-amber{color:#fbbf24}
/* ===== METRICS ===== */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.mc{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:13px}
.mc-lbl{font-size:11px;color:var(--text3);margin-bottom:5px}
.mc-val{font-family:var(--mono);font-size:17px;font-weight:500}
.mc-val.green{color:var(--green)}.mc-val.red{color:var(--red)}.mc-val.amber{color:var(--amber)}
.mc-hint{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ===== LIST ===== */
.li{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.li-icon{width:34px;height:34px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.li-body{flex:1;min-width:0}
.li-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-right{text-align:right;flex-shrink:0}
.li-amt{font-family:var(--mono);font-size:13px;font-weight:500}
.plus{color:var(--green)}.minus{color:var(--red)}
/* ===== SEC HEADER ===== */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;margin-top:2px}
.sh-title{font-size:13px;font-weight:600;color:var(--text2)}
.sh-link{font-size:12px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:'Noto Sans JP';padding:0}
/* ===== CHIPS ===== */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.ch-cash{background:var(--green-lt);color:var(--green)}
.ch-bank{background:#e2e8f0;color:#334155}
.ch-card{background:var(--accent-lt);color:var(--accent)}
.ch-emoney{background:var(--amber-lt);color:var(--amber)}
.ch-point{background:var(--purple-lt);color:var(--purple)}
/* ===== PROGRESS ===== */
.prog{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:2px}
.pg{background:var(--green)}.pa{background:var(--amber)}.pr{background:var(--red)}.pb{background:var(--accent)}
/* ===== UPCOMING ===== */
.upi{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.upi:last-child{border-bottom:none}
.updot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.updot.income{background:var(--green)}.updot.debit{background:var(--accent)}
.upbody{flex:1;min-width:0}
.upname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.update{font-size:11px;color:var(--text3)}
.updays{font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0}
.upamt{font-family:var(--mono);font-size:13px;font-weight:500;flex-shrink:0}
/* ===== FORMS ===== */
.fg{margin-bottom:13px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:15px;font-family:'Noto Sans JP';background:var(--surface);color:var(--text);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* ===== TYPE BUTTONS ===== */
.tbg{display:flex;background:var(--surface2);border-radius:var(--r);padding:3px;margin-bottom:13px;gap:0}
.tb{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'Noto Sans JP';cursor:pointer;color:var(--text3);transition:all .15s}
.tb.ae{background:var(--red-lt);color:var(--red)}
.tb.ai{background:var(--green-lt);color:var(--green)}
.tb.at{background:var(--accent-lt);color:var(--accent)}
/* ===== SPLIT ===== */
.sr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.sr select{flex:1;font-size:13px}
.sr input{width:95px;flex-shrink:0;font-size:13px}
.srm{width:30px;height:30px;border-radius:50%;border:none;background:var(--red-lt);color:var(--red);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sf{display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border)}
.sf-lbl{font-size:12px;color:var(--text3)}
.sf-val{font-family:var(--mono);font-size:12px;font-weight:500}
.sf-val.ok{color:var(--green)}.sf-val.ng{color:var(--red)}
/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP';transition:all .15s;-webkit-appearance:none}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:active{background:#1e40af}
.btn-full{width:100%}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--accent)}
.btn-d{color:var(--red);border-color:var(--red-lt);background:var(--red-lt)}
/* ===== SHEET ===== */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.sh-ov.open{opacity:1;pointer-events:all}
.sh-box{width:100%;background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:0 0 calc(14px + var(--sab));max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sh-ov.open .sh-box{transform:translateY(0)}
.sh-handle{width:34px;height:4px;border-radius:2px;background:var(--surface3);margin:10px auto 12px}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:0 15px 11px;border-bottom:1px solid var(--border)}
.sh-title{font-size:15px;font-weight:600}
.sh-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.sh-body{padding:15px}
/* ===== CALENDAR ===== */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cal-mo{font-family:var(--mono);font-size:15px;font-weight:500}
.cal-h{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cal-h div{font-size:11px;font-weight:600;color:var(--text3);padding:5px 0}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-c{min-height:58px;padding:4px 3px;border-radius:7px;background:var(--surface2)}
.cal-c.today{background:var(--accent-lt);outline:1.5px solid var(--accent)}
.cal-c.other{opacity:.35}
.cal-n{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2)}
.cal-c.today .cal-n{color:var(--accent);font-weight:600}
.cal-ev{font-size:9px;margin-top:1px;padding:1px 3px;border-radius:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ev-i{background:var(--green-lt);color:var(--green)}
.ev-e{background:var(--red-lt);color:var(--red)}
.ev-c{background:var(--accent-lt);color:var(--accent)}
.cal-leg{display:flex;gap:12px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.cal-leg span{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.cld{width:7px;height:7px;border-radius:2px}
/* ===== ACCOUNT ROW ===== */
.ar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.ar:last-child{border-bottom:none}
.ar-bal{font-family:var(--mono);font-size:14px;font-weight:500}
/* ===== SIM ===== */
.sim-r{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.sim-r:last-child{border-bottom:none}
.sim-n{font-size:12px;color:var(--text2)}
.sim-d{font-size:11px;color:var(--green)}
.sim-t{font-family:var(--mono);font-size:13px;font-weight:500}
/* ===== MISC ===== */
.divider{height:1px;background:var(--border);margin:13px 0}
.alert{padding:9px 12px;border-radius:var(--r);font-size:12px;margin-bottom:9px}
.al-info{background:var(--accent-lt);color:#1e40af}
.al-warn{background:var(--amber-lt);color:var(--amber)}
.empty{text-align:center;padding:26px 12px;color:var(--text3)}
.empty-i{font-size:30px;margin-bottom:6px}
.empty-t{font-size:13px}
.hg{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;padding:10px 0 5px;border-top:1px solid var(--border)}
.hg:first-child{border-top:none}
#toast{position:fixed;bottom:calc(76px + var(--sab) + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s}
#toast.show{opacity:1}
#offline-banner{background:var(--amber-lt);color:var(--amber);border-bottom:1px solid var(--amber);text-align:center;font-size:12px;font-weight:500;padding:5px;display:none}
@media(min-width:600px){
  #bottom-nav{display:none!important}
  #toast{bottom:20px}
}
</style>
</head>
<body>
<div id="offline-banner">オフライン中 — ローカルデータを表示しています</div>
<div id="app">
  <!-- SIDEBAR (desktop) -->
  <div id="sidebar">
    <div class="sl">money<span>.</span>log</div>
    <nav class="snav">
      <button class="si active" onclick="nav('dashboard',this)"><span class="si-icon">📊</span>ダッシュボード</button>
      <button class="si" onclick="nav('quick-add',this)"><span class="si-icon">＋</span>取引入力</button>
      <button class="si" onclick="nav('accounts',this)"><span class="si-icon">💳</span>口座管理</button>
      <button class="si" onclick="nav('schedule',this)"><span class="si-icon">📅</span>入金予定</button>
      <button class="si" onclick="nav('fixed',this)"><span class="si-icon">🔁</span>固定引き落とし</button>
      <button class="si" onclick="nav('calendar',this)"><span class="si-icon">🗓</span>カレンダー</button>
      <button class="si" onclick="nav('history',this)"><span class="si-icon">📋</span>履歴</button>
    </nav>
  </div>

  <!-- TOPBAR (mobile) -->
  <div id="topbar">
    <div class="topbar-logo">money<span>.</span>log</div>
    <div id="topbar-date" style="font-family:var(--mono);font-size:11px;color:var(--text3)"></div>
  </div>

  <!-- MAIN -->
  <div id="main-content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div id="d-hero"></div>
      <div class="metrics" id="d-metrics"></div>
      <div class="card"><div class="sh"><div class="sh-title">口座残高</div><button class="sh-link" onclick="nav('accounts')">管理 →</button></div><div id="d-accounts"></div></div>
      <div class="card"><div class="sh"><div class="sh-title">今後の予定（30日）</div><button class="sh-link" onclick="nav('schedule')">詳細 →</button></div><div id="d-upcoming"></div></div>
      <div class="card"><div class="sh"><div class="sh-title">今月カテゴリ別支出</div></div><div id="d-cats"></div></div>
      <div class="card"><div class="sh"><div class="sh-title">直近の取引</div><button class="sh-link" onclick="nav('history')">全履歴 →</button></div><div id="d-recent"></div></div>
    </div>

    <!-- QUICK ADD -->
    <div class="page" id="page-quick-add">
      <div class="card">
        <div class="tbg" id="tx-type-btns">
          <button class="tb ae" onclick="setTxType('expense',this)">支出</button>
          <button class="tb" onclick="setTxType('income',this)">収入</button>
          <button class="tb" onclick="setTxType('transfer',this)">振替</button>
        </div>
        <div class="frow">
          <div class="fg"><label class="fl">日付</label><input type="date" class="fi" id="tx-date"></div>
          <div class="fg"><label class="fl">合計金額 (円)</label><input type="number" class="fi" id="tx-amount" placeholder="0" inputmode="numeric" oninput="updateSplitTotal()"></div>
        </div>
        <div class="fg"><label class="fl">摘要</label><input type="text" class="fi" id="tx-memo" placeholder="スーパー、電気代…"></div>
        <div class="fg"><label class="fl">カテゴリ</label>
          <select class="fi" id="tx-category">
            <option>食費</option><option>交通費</option><option>日用品</option><option>外食</option>
            <option>通信費</option><option>娯楽</option><option>医療</option><option>衣服</option>
            <option>住居費</option><option>教育</option><option>収入</option><option>その他</option>
          </select>
        </div>
        <div class="divider"></div>
        <div class="sh"><div class="sh-title" style="font-size:12px">決済手段（スプリット対応）</div><button class="btn btn-sm btn-ghost" onclick="addSplitRow()">＋ 追加</button></div>
        <div id="split-rows"></div>
        <div class="sf"><span class="sf-lbl">割り当て残り</span><span class="sf-val" id="split-remaining">¥0</span></div>
        <div style="margin-top:13px"><button class="btn btn-p btn-full" onclick="saveTx()">記録する</button></div>
      </div>
      <div class="card">
        <div class="clabel">クレカ引き落とし処理</div>
        <div class="alert al-info">クレカ決済は未払金として記録。引き落とし日に処理してください。</div>
        <div class="fg"><label class="fl">対象カード</label><select class="fi" id="settle-card" onchange="updateSettleInfo()"></select></div>
        <div id="settle-info"></div>
        <div class="fg"><label class="fl">引き落とし日</label><input type="date" class="fi" id="settle-date"></div>
        <button class="btn btn-full" onclick="settleCard()">引き落とし処理を実行</button>
      </div>
    </div>

    <!-- ACCOUNTS -->
    <div class="page" id="page-accounts">
      <div class="card">
        <div class="sh"><div class="sh-title">口座一覧</div><button class="btn btn-sm btn-p" onclick="openAccSheet()">＋ 追加</button></div>
        <div id="acc-list"></div>
      </div>
    </div>

    <!-- SCHEDULE -->
    <div class="page" id="page-schedule">
      <div class="card">
        <div class="sh"><div class="sh-title">入金予定</div><button class="btn btn-sm btn-p" onclick="openSchSheet()">＋ 追加</button></div>
        <div id="sch-list"></div>
      </div>
      <div class="card"><div class="clabel">将来残高シミュレーション</div><div id="sim-list"></div></div>
    </div>

    <!-- CALENDAR -->
    <div class="page" id="page-calendar">
      <div class="card">
        <div class="cal-nav">
          <button class="btn btn-sm" onclick="changeMonth(-1)">◀</button>
          <div class="cal-mo" id="cal-label"></div>
          <button class="btn btn-sm" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-h" id="cal-head"></div>
        <div class="cal-g" id="cal-grid"></div>
        <div class="cal-leg">

            <option>住居費</option><option>通信費</option><option>娯楽</option><option>光熱費</option>
            <option>保険</option><option>教育</option><option>その他</option>
          </select>

      <button class="btn btn-p btn-full" onclick="saveFixed()">登録</button>

<div id="toast"></div>

<script>
// ===== DATA =====
const DB = {
  get: (k,d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch(e) { return d; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};
const load = () => ({
  accounts: DB.get('ml_accounts', []),
  transactions: DB.get('ml_transactions', []),
  schedules: DB.get('ml_schedules', []),
  unpaid: DB.get('ml_unpaid', []),
  fixedCosts: DB.get('ml_fixedCosts', []),
});
const save = (k,v) => DB.set('ml_'+k, v);

// ===== HELPERS =====
const fmt = n => '¥' + Math.round(n).toLocaleString('ja-JP');
const today = () => new Date().toISOString().split('T')[0];
const uid = () => (Date.now().toString(36) + Math.random().toString(36).slice(2));
const fmtD = d => d ? new Date(d+'T00:00:00').toLocaleDateString('ja-JP',{month:'short',day:'numeric'}) : '';
const san = s => String(s||'').replace(/[<>&"']/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
const gv = id => { const e = document.getElementById(id); return e ? e.value : ''; };
const sv = (id,v) => { const e = document.getElementById(id); if(e) e.value = v ?? ''; };
const se = (id,h) => { const e = document.getElementById(id); if(e) e.innerHTML = h; };

const CHIP = {cash:'ch-cash',bank:'ch-bank',card:'ch-card',emoney:'ch-emoney',point:'ch-point'};
const ATYPE = {cash:'現金',bank:'銀行',card:'クレジット',emoney:'電マネー',point:'ポイント'};
const CICO = {'食費':'🍱','交通費':'🚃','日用品':'🛒','外食':'🍜','通信費':'📱','娯楽':'🎮','医療':'💊','衣服':'👕','住居費':'🏠','教育':'📚','収入':'💰','その他':'📋'};

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ===== NAV =====
let curPage = 'dashboard';
function nav(page, btn) {
  curPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-'+page);
  if (el) el.classList.add('active');
  document.querySelectorAll('.si').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(b => b.classList.remove('active'));
  if (btn) {
    if (btn.classList.contains('si')) btn.classList.add('active');
    if (btn.classList.contains('ni')) btn.classList.add('active');
  }
  const niEl = document.getElementById('ni-'+page);
  if (niEl) niEl.classList.add('active');
  renderPage(page);
}
function renderPage(p) {
  switch(p) {
    case 'dashboard': renderDash(); break;
    case 'quick-add': initQA(); break;
    case 'accounts': renderAccounts(); break;
    case 'schedule': renderSchedule(); break;
    case 'calendar': renderCalendar(); break;
    case 'history': renderHistory(); break;
    case 'fixed': renderFixed(); break;
  }
}

// ===== SHEETS =====
function openSheet(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('open');
  el.onclick = e => { if (e.target === el) closeSheet(id); };
}
function closeSheet(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}
function openQSheet() {
  if (window.innerWidth < 600) {
    initQSheet(); openSheet('qs-sheet');
  } else {
    nav('quick-add', document.querySelector('.si:nth-child(2)'));
  }
}
function openAccSheet() { resetAccForm(); openSheet('acc-sheet'); }
function openSchSheet() { populateSchSel(); openSheet('sch-sheet'); }

// ===== DASHBOARD =====
function renderDash() {
  const {accounts: _rawAcc, transactions, schedules, unpaid} = load();
  const _ORDER={cash:0,bank:1,emoney:2,point:3,card:4};
  const accounts=[..._rawAcc].sort((a,b)=>(_ORDER[a.type]??9)-(_ORDER[b.type]??9));
  const now = new Date();
  const mo = now.toISOString().slice(0,7);
  const liquid = accounts.filter(a=>a.type!=='card').reduce((s,a)=>s+(a.balance||0),0);
  const txMo = transactions.filter(t=>t.date&&t.date.startsWith(mo));
  const exp = txMo.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.amount||0),0);
  const inc = txMo.filter(t=>t.type==='income').reduce((s,t)=>s+(t.amount||0),0);
  const unpaidTotal = unpaid.reduce((s,u)=>s+(u.amount||0),0);
  const upcomingSch = schedules.filter(s=>s.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  const nextInc = upcomingSch[0];
  const daysNext = nextInc ? Math.ceil((new Date(nextInc.date+'T00:00:00')-now)/86400000) : null;

  se('d-hero',`<div class="hero">
    <div class="hero-lbl">流動資産合計</div>
    <div class="hero-amt">${fmt(liquid)}</div>
    <div class="hero-row">
      <div class="hero-item"><div class="hero-item-lbl">今月収入</div><div class="hero-item-val hv-plus">+${fmt(inc)}</div></div>
      <div class="hero-item"><div class="hero-item-lbl">今月支出</div><div class="hero-item-val hv-minus">-${fmt(exp)}</div></div>
      <div class="hero-item"><div class="hero-item-lbl">未払金</div><div class="hero-item-val hv-amber">${fmt(unpaidTotal)}</div></div>
    </div>
  </div>`);

  se('d-metrics',`
    <div class="mc"><div class="mc-lbl">次の入金まで</div><div class="mc-val ${daysNext!==null&&daysNext<=5?'green':''}">${daysNext!==null?daysNext+'日':'--'}</div><div class="mc-hint">${nextInc?san(nextInc.name)+' '+fmt(nextInc.amount):'予定なし'}</div></div>
    <div class="mc"><div class="mc-lbl">今月収支</div><div class="mc-val ${inc-exp>=0?'green':'red'}">${inc-exp>=0?'+':''}${fmt(inc-exp)}</div><div class="mc-hint">収入−支出</div></div>`);

  // Accounts
  let ah = '';
  if (!accounts.length) ah='<div class="empty"><div class="empty-i">💳</div><div class="empty-t">口座を追加してください</div></div>';
  else accounts.forEach(a=>{
    const cc = CHIP[a.type]||'ch-bank';
    const used = a.type==='card'?unpaid.filter(u=>u.accountId===a.id).reduce((s,u)=>s+u.amount,0):0;
    const lbar = a.type==='card'&&a.limit?(() => {
      const pct=Math.min(100,Math.round(used/a.limit*100));
      const c=pct>80?'r':pct>50?'a':'g';
      return `<div style="font-size:10px;color:var(--text3)">${fmt(used)} / ${fmt(a.limit)}</div><div class="prog"><div class="pf p${c}" style="width:${pct}%"></div></div>`;
    })():'';
    ah+=`<div class="ar">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span class="chip ${cc}">${ATYPE[a.type]}</span>
          <span style="font-size:13px;font-weight:500">${san(a.name)}</span>
        </div>${lbar}
      </div>
      <div class="ar-bal">${fmt(a.balance||0)}</div>
    </div>`;
  });
  se('d-accounts', ah);

  // Upcoming
  const in30 = new Date(); in30.setDate(in30.getDate()+30);
  const in30s = in30.toISOString().split('T')[0];
  const evts = [];
  schedules.filter(s=>s.date>=today()&&s.date<=in30s).forEach(s=>{
    const d=Math.ceil((new Date(s.date+'T00:00:00')-now)/86400000);
    evts.push({date:s.date,days:d,name:s.name,amount:s.amount,type:'income'});
  });
  unpaid.filter(u=>u.debitDate>=today()&&u.debitDate<=in30s).forEach(u=>{
    const acc=accounts.find(a=>a.id===u.accountId);
    const d=Math.ceil((new Date(u.debitDate+'T00:00:00')-now)/86400000);
    evts.push({date:u.debitDate,days:d,name:(acc?san(acc.name):'カード')+'引き落とし',amount:u.amount,type:'debit'});
  });
  evts.sort((a,b)=>a.date.localeCompare(b.date));
  let uh='';
  if (!evts.length) uh='<div class="empty"><div class="empty-t">今後30日の予定なし</div></div>';
  else evts.slice(0,6).forEach(e=>{
    const dl=e.days===0?'今日':e.days+'日後';
    const color=e.type==='income'?'var(--green)':'var(--accent)';
    const sign=e.type==='income'?'+':'-';
    uh+=`<div class="upi"><div class="updot ${e.type==='income'?'income':'debit'}"></div>
      <div class="upbody"><div class="upname">${san(e.name)}</div><div class="update">${fmtD(e.date)}</div></div>
      <div class="updays">${dl}</div>
      <div class="upamt" style="color:${color}">${sign}${fmt(e.amount)}</div>
    </div>`;
  });
  se('d-upcoming', uh);

  // Category
  const cats={};
  txMo.filter(t=>t.type==='expense').forEach(t=>{cats[t.category]=(cats[t.category]||0)+(t.amount||0);});
  const ce=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  let ch='';
  if (!ce.length) ch='<div class="empty"><div class="empty-t">今月の支出データなし</div></div>';
  else ce.slice(0,6).forEach(([cat,amt])=>{
    const pct=exp>0?Math.round(amt/exp*100):0;
    ch+=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
      <div style="width:30px;height:30px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${CICO[cat]||'📋'}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
          <span>${san(cat)}</span><span style="font-family:var(--mono);font-weight:500">${fmt(amt)}</span>
        </div>
        <div class="prog"><div class="pf pb" style="width:${pct}%"></div></div>
      </div>
      <div style="font-size:10px;color:var(--text3);width:28px;text-align:right">${pct}%</div>
    </div>`;
  });
  se('d-cats', ch);

  // Recent
  const rec=[...transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  let rh='';
  if (!rec.length) rh='<div class="empty"><div class="empty-i">📝</div><div class="empty-t">取引を記録してください</div></div>';
  else rec.forEach(t=>{
    const sign=t.type==='income'?'+':'-';
    const cls=t.type==='income'?'plus':'minus';
    const pay=(t.splits||[]).map(s=>{const a=accounts.find(x=>x.id===s.accountId);return a?san(a.name):'?';}).join('＋');
    rh+=`<div class="li">
      <div class="li-icon">${CICO[t.category]||'📋'}</div>
      <div class="li-body"><div class="li-name">${san(t.memo||'（摘要なし）')}</div><div class="li-sub">${fmtD(t.date)} ${san(t.category||'')}${pay?' ・'+pay:''}</div></div>
      <div class="li-right"><div class="li-amt ${cls}">${sign}${fmt(t.amount)}</div></div>
    </div>`;
  });
  se('d-recent', rh);
}

// ===== TRANSACTION STATE =====
let txType='expense', qsType='expense', splitRows=[];

function setTxType(type, btn) {
  txType=type;
  document.querySelectorAll('#tx-type-btns .tb').forEach(b=>b.className='tb');
  if(btn) btn.className='tb a'+type[0];
}
function setQsType(type, btn) {
  qsType=type;
  document.querySelectorAll('#qs-type-btns .tb').forEach(b=>b.className='tb');
  if(btn) btn.className='tb a'+type[0];
}

// ===== SPLIT ROWS =====
function initQA() {
  sv('tx-date', today()); sv('tx-amount',''); sv('tx-memo','');
  splitRows=[];
  se('split-rows','');
  addSplitRow();
  populateSettleCard();
}

function addSplitRow() {
  const {accounts}=load();
  if (!accounts.length) { toast('先に口座を追加してください'); return; }
  const id=uid(); splitRows.push(id);
  const c=document.getElementById('split-rows');
  if (!c) return;
  const d=document.createElement('div');
  d.className='sr'; d.id='sr-'+id;
  d.innerHTML=`<select class="fi" id="sra-${id}" style="flex:1;font-size:13px">${accounts.map(a=>`<option value="${a.id}">${san(a.name)}</option>`).join('')}</select>
    <input type="number" class="fi" id="srm-${id}" placeholder="金額" inputmode="numeric" style="width:95px" oninput="updateSplitTotal()">
    <button class="srm" onclick="removeSplitRow('${id}')">×</button>`;
  c.appendChild(d);
}
function removeSplitRow(id) {
  if (splitRows.length<=1) { toast('最低1行必要です'); return; }
  splitRows=splitRows.filter(r=>r!==id);
  document.getElementById('sr-'+id)?.remove();
  updateSplitTotal();
}
function updateSplitTotal() {
  const total=parseFloat(gv('tx-amount'))||0;
  const alloc=splitRows.reduce((s,id)=>s+(parseFloat(gv('srm-'+id))||0),0);
  const rem=total-alloc;
  const el=document.getElementById('split-remaining');
  if(!el) return;
  el.textContent=fmt(Math.round(rem));
  el.className='sf-val '+(Math.abs(rem)<1?'ok':'ng');
}

function saveTx() {
  const {accounts,transactions,unpaid}=load();
  const date=gv('tx-date'), amount=parseFloat(gv('tx-amount')), memo=gv('tx-memo').trim(), category=gv('tx-category');
  if (!date||!amount||amount<=0) { toast('日付と金額を入力してください'); return; }
  const splits=splitRows.map(id=>({accountId:gv('sra-'+id),amount:parseFloat(gv('srm-'+id))||0})).filter(s=>s.amount>0);
  const totalSplit=splits.reduce((s,r)=>s+r.amount,0);
  if (splits.length>0&&Math.abs(totalSplit-amount)>1) { toast('内訳の合計が一致しません'); return; }

  const updAcc=[...accounts];
  const updUnpaid=[...unpaid];
  splits.forEach(sp=>{
    const idx=updAcc.findIndex(a=>a.id===sp.accountId);
    if(idx<0) return;
    const acc=updAcc[idx];
    if (txType==='expense') {
      if (acc.type==='card') {
        updUnpaid.push({id:uid(),accountId:acc.id,amount:sp.amount,memo:memo||'（摘要なし）',date,debitDate:nextDebitDate(acc)});
      } else {
        updAcc[idx]={...acc,balance:(acc.balance||0)-sp.amount};
      }
    } else if (txType==='income') {
      updAcc[idx]={...acc,balance:(acc.balance||0)+sp.amount};
    }
  });
  save('accounts',updAcc); save('unpaid',updUnpaid);

  const tx={id:uid(),date,amount,memo,category,type:txType,splits};
  transactions.push(tx); save('transactions',transactions);
  initQA(); toast('記録しました ✓'); renderDash();
}

// ===== CARD SETTLE =====
function nextDebitDate(acc) {
  const day=acc.debitDay||27;
  const now=new Date();
  return new Date(now.getFullYear(),now.getMonth()+1,day).toISOString().split('T')[0];
}
function populateSettleCard() {
  const {accounts}=load();
  const cards=accounts.filter(a=>a.type==='card');
  const sel=document.getElementById('settle-card');
  if(sel) sel.innerHTML=cards.map(a=>`<option value="${a.id}">${san(a.name)}</option>`).join('')||'<option value="">クレカなし</option>';
  updateSettleInfo();
}
function updateSettleInfo() {
  const {accounts,unpaid}=load();
  const id=gv('settle-card');
  const acc=accounts.find(a=>a.id===id);
  if (!acc) { se('settle-info',''); return; }
  const used=unpaid.filter(u=>u.accountId===id).reduce((s,u)=>s+u.amount,0);
  se('settle-info',`<div class="alert al-info">未払い合計: ${fmt(used)}</div>`);
  const now=new Date();
  sv('settle-date',new Date(now.getFullYear(),now.getMonth()+1,acc.debitDay||27).toISOString().split('T')[0]);
}
function settleCard() {
  const {accounts,transactions,unpaid}=load();
  const id=gv('settle-card'); const debitDate=gv('settle-date');
  const toSettle=unpaid.filter(u=>u.accountId===id&&u.debitDate<=debitDate);
  if (!toSettle.length) { toast('該当する未払金がありません'); return; }
  const total=toSettle.reduce((s,u)=>s+u.amount,0);
  const bank=accounts.find(a=>a.type==='bank'||a.type==='cash');
  if (!bank) { toast('銀行/現金口座が見つかりません'); return; }
  if (!confirm(`${fmt(total)}を${bank.name}から引き落とし処理しますか？`)) return;
  const updAcc=accounts.map(a=>a.id===bank.id?{...a,balance:(a.balance||0)-total}:a);
  save('accounts',updAcc);
  save('unpaid',unpaid.filter(u=>!(u.accountId===id&&u.debitDate<=debitDate)));
  const acc=accounts.find(a=>a.id===id);
  transactions.push({id:uid(),date:debitDate,amount:total,memo:(acc?acc.name:'カード')+'引き落とし',category:'その他',type:'expense',splits:[{accountId:bank.id,amount:total}]});
  save('transactions',transactions);
  populateSettleCard(); renderDash(); toast('引き落とし処理完了 ✓');
}

// ===== ACCOUNTS =====
function renderAccounts() {
  const {accounts: rawAccounts,unpaid}=load();
  const TYPE_ORDER={cash:0,bank:1,emoney:2,point:3,card:4};
  const accounts=[...rawAccounts].sort((a,b)=>(TYPE_ORDER[a.type]??9)-(TYPE_ORDER[b.type]??9));
  let h='';
  if (!accounts.length) h='<div class="empty"><div class="empty-i">💳</div><div class="empty-t">口座を追加してください</div></div>';
  else accounts.forEach(a=>{
    const cc=CHIP[a.type]||'ch-bank';
    const used=a.type==='card'?unpaid.filter(u=>u.accountId===a.id).reduce((s,u)=>s+u.amount,0):0;
    const lbar=a.type==='card'&&a.limit?(() => {
      const pct=Math.min(100,Math.round(used/a.limit*100));
      const c=pct>80?'r':pct>50?'a':'g';
      return `<div style="font-size:10px;color:var(--text3);margin-top:2px">${fmt(used)} / ${fmt(a.limit)}（${pct}%）</div><div class="prog"><div class="pf p${c}" style="width:${pct}%"></div></div>`;
    })():'';
    h+=`<div class="ar" style="align-items:flex-start">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span class="chip ${cc}">${ATYPE[a.type]}</span>
          <span style="font-size:13px;font-weight:500">${san(a.name)}</span>
          ${a.debitDay?`<span style="font-size:11px;color:var(--text3)">${a.debitDay}日引落</span>`:''}
        </div>${lbar}
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <div class="ar-bal">${fmt(a.balance||0)}</div>
        <button class="btn btn-sm" onclick="editAccount('${a.id}')">編集</button>
        <button class="btn btn-sm btn-d" onclick="deleteAccount('${a.id}')">削除</button>
      </div>
    </div>`;
  });
  se('acc-list', h);
}
function toggleCardFields() {

}

function editAccount(id) {

}
function saveAccount() {
  const accounts=load().accounts;

  const limit=parseFloat(gv('acc-limit'))||undefined,debitDay=parseInt(gv('acc-debit-day'))||undefined;

// ===== SCHEDULE =====
function renderSchedule() {
  const {schedules,accounts}=load();
  const now=new Date();
  let h='';
  if (!schedules.length) h='<div class="empty"><div class="empty-i">📅</div><div class="empty-t">入金予定を追加してください</div></div>';
  else schedules.forEach(s=>{
    const acc=accounts.find(a=>a.id===s.accountId);
    const d=Math.ceil((new Date(s.date+'T00:00:00')-now)/86400000);
    const dl=d<0?`${Math.abs(d)}日前`:d===0?'今日':`${d}日後`;
    const rpt={none:'一回',monthly:'毎月',bimonthly:'隔月',yearly:'毎年'}[s.repeat]||'';
    h+=`<div class="li">
      <div class="li-icon">💰</div>
      <div class="li-body"><div class="li-name">${san(s.name)}</div><div class="li-sub">${fmtD(s.date)}（${dl}）${acc?' ・'+san(acc.name):''} ${rpt}</div></div>
      <div class="li-right" style="display:flex;align-items:center;gap:7px">
        <div><div class="li-amt plus">+${fmt(s.amount)}</div></div>
        <button class="btn btn-sm" onclick="receiveSchedule('${s.id}')">受取</button>
        <button class="btn btn-sm btn-d" onclick="deleteSchedule('${s.id}')">×</button>
      </div>
    </div>`;
  });
  se('sch-list', h);
  renderSim();
}
function renderSim() {
  const {schedules,accounts}=load();
  const liquid=accounts.filter(a=>a.type!=='card').reduce((s,a)=>s+(a.balance||0),0);
  const future=schedules.filter(s=>s.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  if (!future.length) { se('sim-list','<div style="font-size:13px;color:var(--text3)">登録済みの入金予定なし</div>'); return; }
  let running=liquid;
  let h=`<div class="sim-r"><span class="sim-n" style="color:var(--text3)">現在残高</span><div class="sim-t">${fmt(running)}</div></div>`;
  future.slice(0,6).forEach(s=>{
    running+=s.amount;
    h+=`<div class="sim-r"><div class="sim-n">${san(s.name)}（${fmtD(s.date)}）</div><div style="text-align:right"><div class="sim-d">+${fmt(s.amount)}</div><div class="sim-t">${fmt(running)}</div></div></div>`;
  });
  se('sim-list', h);
}
function populateSchSel() {
  const sel=document.getElementById('sch-account');
  if(sel) sel.innerHTML=load().accounts.map(a=>`<option value="${a.id}">${san(a.name)}</option>`).join('');
}
function saveSchedule() {
  const schedules=load().schedules;
  const name=gv('sch-name').trim(),amount=parseFloat(gv('sch-amount')),accountId=gv('sch-account'),date=gv('sch-date'),repeat=gv('sch-repeat'),memo=gv('sch-memo').trim();
  if (!name||!amount||!date) { toast('項目名・金額・日付を入力してください'); return; }
  schedules.push({id:uid(),name,amount,accountId,date,repeat,memo});
  save('schedules',schedules); closeSheet('sch-sheet'); renderSchedule(); toast('登録しました ✓');
}
function receiveSchedule(id) {
  const {schedules,accounts,transactions}=load();
  const s=schedules.find(x=>x.id===id); if(!s) return;
  const acc=accounts.find(a=>a.id===s.accountId);
  if (!acc) { toast('口座が見つかりません'); return; }
  save('accounts',accounts.map(a=>a.id===s.accountId?{...a,balance:(a.balance||0)+s.amount}:a));
  transactions.push({id:uid(),date:today(),amount:s.amount,memo:s.name,category:'収入',type:'income',splits:[{accountId:s.accountId,amount:s.amount}]});
  save('transactions',transactions);
  if (s.repeat==='none') {
    save('schedules',schedules.filter(x=>x.id!==id));
  } else {
    const d=new Date(s.date+'T00:00:00');
    if(s.repeat==='monthly') d.setMonth(d.getMonth()+1);
    else if(s.repeat==='bimonthly') d.setMonth(d.getMonth()+2);
    else if(s.repeat==='yearly') d.setFullYear(d.getFullYear()+1);
    save('schedules',schedules.map(x=>x.id===id?{...x,date:d.toISOString().split('T')[0]}:x));
  }
  renderSchedule(); renderDash(); toast(`${fmt(s.amount)}を受取済みとして記録 ✓`);
}
function deleteSchedule(id) {
  if (!confirm('削除しますか？')) return;
  save('schedules',load().schedules.filter(s=>s.id!==id));
  renderSchedule(); toast('削除しました');
}

// ===== CALENDAR =====
let calY=new Date().getFullYear(), calM=new Date().getMonth();
function renderCalendar() {
  const {transactions,schedules,unpaid,fixedCosts=[]}=load();
  document.getElementById('cal-label').textContent=`${calY}年 ${calM+1}月`;
  se('cal-head',['日','月','火','水','木','金','土'].map(d=>`<div>${d}</div>`).join(''));
  const first=new Date(calY,calM,1), last=new Date(calY,calM+1,0), tds=today();
  let h='';
  for(let i=0;i<first.getDay();i++) h+=`<div class="cal-c other"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===tds;
    const inc=transactions.filter(t=>t.date===ds&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp=transactions.filter(t=>t.date===ds&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const hasSch=schedules.some(s=>s.date===ds);
    const hasD=unpaid.some(u=>u.debitDate===ds);
    const fixedDay=parseInt(ds.slice(8));
    const fixedOnDay=fixedCosts.filter(f=>f.day===fixedDay);
    let ev='';
    if(inc>0) ev+=`<div class="cal-ev ev-i">+${fmt(inc)}</div>`;
    if(exp>0) ev+=`<div class="cal-ev ev-e">-${fmt(exp)}</div>`;
    if(hasSch) ev+=`<div class="cal-ev ev-i">入金</div>`;
    if(hasD) ev+=`<div class="cal-ev ev-c">引落</div>`;
    fixedOnDay.forEach(f=>{ ev+=`<div class="cal-ev ev-c" title="${san(f.name)}">${san(f.name.length>4?f.name.slice(0,4)+'…':f.name)}</div>`; });
    h+=`<div class="cal-c ${isT?'today':''}"><div class="cal-n">${d}</div>${ev}</div>`;
  }
  se('cal-grid', h);
}
function changeMonth(delta) {
  calM+=delta;
  if(calM>11){calM=0;calY++;}
  if(calM<0){calM=11;calY--;}
  renderCalendar();
}

function deleteFixed(id) {

// ===== HISTORY =====
function renderHistory() {
  const {transactions,accounts}=load();
  const fm=gv('filter-month'), ft=gv('filter-type');
  const months=[...new Set(transactions.map(t=>t.date.slice(0,7)))].sort().reverse();
  const sel=document.getElementById('filter-month');
  if(sel){const p=sel.value;sel.innerHTML='<option value="">全期間</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');sel.value=p;}
  let filtered=[...transactions];
  if(fm) filtered=filtered.filter(t=>t.date.startsWith(fm));
  if(ft) filtered=filtered.filter(t=>t.type===ft);
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  let h='';
  if(!filtered.length) h='<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">該当する取引なし</div></div>';
  let lastMo='';
  filtered.forEach(t=>{
    const mo=t.date.slice(0,7);
    if(mo!==lastMo){h+=`<div class="hg">${mo}</div>`;lastMo=mo;}
    const sign=t.type==='income'?'+':'-';
    const cls=t.type==='income'?'plus':'minus';
    const pay=(t.splits||[]).map(s=>{const a=accounts.find(x=>x.id===s.accountId);return a?san(a.name):'?';}).join('＋');
    h+=`<div class="li">
      <div class="li-icon">${CICO[t.category]||'📋'}</div>
      <div class="li-body"><div class="li-name">${san(t.memo||'（摘要なし）')}</div><div class="li-sub">${t.date} ${san(t.category||'')}${pay?' ・'+pay:''}</div></div>
      <div class="li-right" style="display:flex;align-items:center;gap:6px">
        <div class="li-amt ${cls}">${sign}${fmt(t.amount)}</div>
        <button class="btn btn-sm btn-d" onclick="deleteTx('${t.id}')">×</button>
      </div>
    </div>`;
  });
  se('hist-list', h);
}
function deleteTx(id) {
  if(!confirm('削除しますか？（残高の自動調整はされません）')) return;
  save('transactions',load().transactions.filter(t=>t.id!==id));
  renderHistory(); toast('削除しました');
}
