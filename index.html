<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="money.log">
<meta name="theme-color" content="#1a1916">
<title>money.log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f5f3ee;
  color: #1a1916;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

/* ===== CSS VARIABLES ===== */
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --surface3: #e8e4db;
  --border: rgba(26,25,22,0.1);
  --border2: rgba(26,25,22,0.18);
  --text: #1a1916;
  --text2: #5c5a56;
  --text3: #9e9b95;
  --accent: #1d4ed8;
  --accent-lt: #dbeafe;
  --green: #15803d;
  --green-lt: #dcfce7;
  --red: #b91c1c;
  --red-lt: #fee2e2;
  --amber: #b45309;
  --amber-lt: #fef3c7;
  --purple: #6d28d9;
  --purple-lt: #ede9fe;
  --mono: 'DM Mono', monospace;
  --r: 10px;
  --r-lg: 16px;
  --r-xl: 20px;
  /* Safe area insets for iOS */
  --sat: env(safe-area-inset-top);
  --sab: env(safe-area-inset-bottom);
  --sal: env(safe-area-inset-left);
  --sar: env(safe-area-inset-right);
}

/* ===== APP SHELL ===== */
#app { display: flex; flex-direction: column; min-height: 100dvh; }

/* ===== AUTH SCREEN ===== */
#auth-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; padding: 32px 24px;
  background: var(--bg);
}
.auth-logo { font-family: var(--mono); font-size: 28px; font-weight: 500; letter-spacing: -0.03em; margin-bottom: 8px; }
.auth-logo span { color: var(--accent); }
.auth-tagline { font-size: 13px; color: var(--text3); margin-bottom: 40px; text-align: center; }
.auth-card {
  width: 100%; max-width: 360px;
  background: var(--surface); border-radius: var(--r-xl);
  padding: 28px 24px; border: 1px solid var(--border);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
.auth-tabs { display: flex; gap: 0; background: var(--surface2); border-radius: var(--r); padding: 3px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 8px; border: none; background: none; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: 'Noto Sans JP'; cursor: pointer; color: var(--text3); transition: all .15s; }
.auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.auth-error { font-size: 12px; color: var(--red); background: var(--red-lt); padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; display: none; }

/* ===== TOP BAR (mobile) ===== */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  padding-top: var(--sat);
  display: flex; align-items: center; justify-content: space-between;
  height: calc(52px + var(--sat));
  display: none;
}
.topbar-logo { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.topbar-logo span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: var(--surface2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background .15s;
}
.icon-btn:active { background: var(--surface3); }

/* ===== MAIN CONTENT ===== */
#main-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding-bottom: calc(80px + var(--sab));
  -webkit-overflow-scrolling: touch;
  display: none;
}
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ===== BOTTOM NAV ===== */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: var(--sab);
  display: none;
}
.bottom-nav-inner { display: flex; align-items: stretch; height: 60px; }
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; cursor: pointer;
  color: var(--text3); font-size: 10px; font-weight: 500; font-family: 'Noto Sans JP';
  transition: color .15s; padding: 6px 0; position: relative;
}
.nav-item.active { color: var(--accent); }
.nav-item-icon { font-size: 20px; line-height: 1; }
.nav-item.center-btn { flex: 0 0 72px; }
.nav-item.center-btn .nav-center-circle {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; line-height: 1; font-weight: 300;
  box-shadow: 0 4px 12px rgba(29,78,216,0.35);
  transition: transform .1s, box-shadow .1s;
}
.nav-item.center-btn:active .nav-center-circle { transform: scale(0.94); box-shadow: 0 2px 6px rgba(29,78,216,0.3); }

/* ===== CARDS ===== */
.card {
  background: var(--surface); border-radius: var(--r-lg);
  border: 1px solid var(--border); padding: 16px;
  margin-bottom: 12px;
}
.card-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 10px; }

/* ===== HERO BALANCE CARD ===== */
.hero-card {
  background: var(--text); color: #fff; border-radius: var(--r-xl);
  padding: 20px; margin-bottom: 12px; position: relative; overflow: hidden;
}
.hero-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.hero-card::after {
  content: ''; position: absolute; bottom: -20px; left: 20px;
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.hero-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: .06em; }
.hero-amount { font-family: var(--mono); font-size: 34px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; }
.hero-sub { display: flex; gap: 16px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); }
.hero-sub-item { flex: 1; }
.hero-sub-label { font-size: 10px; color: rgba(255,255,255,0.45); margin-bottom: 3px; }
.hero-sub-value { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.hero-sub-value.plus { color: #4ade80; }
.hero-sub-value.minus { color: #f87171; }

/* ===== METRICS ROW ===== */
.metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.metric-card { background: var(--surface); border-radius: var(--r-lg); border: 1px solid var(--border); padding: 14px; }
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.metric-value { font-family: var(--mono); font-size: 18px; font-weight: 500; line-height: 1.2; }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--red); }
.metric-value.amber { color: var(--amber); }
.metric-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ===== LIST ITEMS ===== */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.item-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface2); display: flex; align-items: center;
  justify-content: center; font-size: 17px; flex-shrink: 0;
}
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { font-size: 11px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-right { text-align: right; flex-shrink: 0; }
.item-amount { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.item-amount.plus { color: var(--green); }
.item-amount.minus { color: var(--red); }
.item-date { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ===== SECTION HEADER ===== */
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; margin-top: 4px; }
.sec-title { font-size: 13px; font-weight: 600; color: var(--text2); }
.sec-link { font-size: 12px; color: var(--accent); cursor: pointer; }

/* ===== ACCOUNT CHIPS ===== */
.chip { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.chip-cash { background: var(--green-lt); color: var(--green); }
.chip-bank { background: var(--surface2); color: var(--text2); }
.chip-card { background: var(--accent-lt); color: var(--accent); }
.chip-emoney { background: var(--amber-lt); color: var(--amber); }
.chip-point { background: var(--purple-lt); color: var(--purple); }

/* ===== PROGRESS ===== */
.prog { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.prog-fill { height: 100%; border-radius: 2px; }
.prog-green { background: var(--green); }
.prog-amber { background: var(--amber); }
.prog-red { background: var(--red); }
.prog-blue { background: var(--accent); }

/* ===== UPCOMING ===== */
.upcoming-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.upcoming-item:last-child { border-bottom: none; }
.upcoming-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.upcoming-dot.income { background: var(--green); }
.upcoming-dot.debit { background: var(--accent); }
.upcoming-body { flex: 1; min-width: 0; }
.upcoming-name { font-size: 13px; font-weight: 500; }
.upcoming-date { font-size: 11px; color: var(--text3); }
.upcoming-days { font-family: var(--mono); font-size: 11px; color: var(--text3); flex-shrink: 0; }
.upcoming-amount { font-family: var(--mono); font-size: 13px; font-weight: 500; flex-shrink: 0; }

/* ===== FORMS ===== */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.form-input {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border2); border-radius: var(--r);
  font-size: 15px; font-family: 'Noto Sans JP'; background: var(--surface);
  color: var(--text); outline: none; transition: border .15s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ===== TYPE SELECTOR ===== */
.type-btns { display: flex; gap: 0; background: var(--surface2); border-radius: var(--r); padding: 3px; margin-bottom: 14px; }
.type-btn { flex: 1; padding: 9px; border: none; background: none; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: 'Noto Sans JP'; cursor: pointer; color: var(--text3); transition: all .15s; }
.type-btn.active-expense { background: var(--red-lt); color: var(--red); }
.type-btn.active-income { background: var(--green-lt); color: var(--green); }
.type-btn.active-transfer { background: var(--accent-lt); color: var(--accent); }

/* ===== SPLIT ROWS ===== */
.split-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.split-row select { flex: 1; font-size: 13px; }
.split-row input { width: 100px; flex-shrink: 0; }
.split-remove { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--red-lt); color: var(--red); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.split-footer { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border); }
.split-footer-label { font-size: 12px; color: var(--text3); }
.split-footer-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.split-footer-val.ok { color: var(--green); }
.split-footer-val.ng { color: var(--red); }

/* ===== BUTTONS ===== */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 18px; border-radius: var(--r); border: 1.5px solid var(--border2); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP'; transition: all .15s; -webkit-appearance: none; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:active { background: #1e40af; }
.btn-full { width: 100%; }
.btn-sm { padding: 7px 12px; font-size: 12px; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--accent); }
.btn-danger { color: var(--red); border-color: var(--red-lt); background: var(--red-lt); }

/* ===== MODAL SHEET ===== */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  width: 100%; background: var(--surface);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 0 0 calc(16px + var(--sab));
  max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sheet-overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 10px auto 14px; }
.sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 12px; border-bottom: 1px solid var(--border); }
.sheet-title { font-size: 16px; font-weight: 600; }
.sheet-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--surface2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
.sheet-body { padding: 16px; }

/* ===== CALENDAR ===== */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-month { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.cal-head { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; }
.cal-head div { font-size: 11px; font-weight: 600; color: var(--text3); padding: 6px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-cell { min-height: 62px; padding: 5px 4px; border-radius: 8px; background: var(--surface2); position: relative; }
.cal-cell.today { background: var(--accent-lt); outline: 1.5px solid var(--accent); }
.cal-cell.other { opacity: 0.35; }
.cal-num { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text2); }
.cal-cell.today .cal-num { color: var(--accent); font-weight: 600; }
.cal-ev { font-size: 9px; margin-top: 2px; padding: 1px 3px; border-radius: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.cal-ev-income { background: var(--green-lt); color: var(--green); }
.cal-ev-expense { background: var(--red-lt); color: var(--red); }
.cal-ev-card { background: var(--accent-lt); color: var(--accent); }
.cal-legend { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.cal-legend span { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.cal-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ===== ACCOUNT BALANCE ROWS ===== */
.acc-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.acc-row:last-child { border-bottom: none; }
.acc-row-left { display: flex; align-items: center; gap: 8px; }
.acc-row-name { font-size: 13px; font-weight: 500; }
.acc-row-balance { font-family: var(--mono); font-size: 14px; font-weight: 500; }

/* ===== SCHEDULE SIMULATION ===== */
.sim-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sim-row:last-child { border-bottom: none; }
.sim-name { font-size: 12px; color: var(--text2); }
.sim-right { text-align: right; }
.sim-delta { font-size: 11px; color: var(--green); }
.sim-total { font-family: var(--mono); font-size: 14px; font-weight: 500; }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: calc(80px + var(--sab) + 8px); left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 10px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 500; z-index: 300; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#toast.show { opacity: 1; }

/* ===== OFFLINE BANNER ===== */
#offline-banner {
  background: var(--amber-lt); color: var(--amber); border-bottom: 1px solid var(--amber);
  text-align: center; font-size: 12px; font-weight: 500; padding: 6px;
  display: none;
}

/* ===== LOADING ===== */
.loading { display: flex; align-items: center; justify-content: center; padding: 32px; color: var(--text3); font-size: 13px; gap: 8px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== EMPTY STATE ===== */
.empty { text-align: center; padding: 28px 16px; color: var(--text3); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty-text { font-size: 13px; }

/* ===== QUICK ADD FAB ANIMATION ===== */
@keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.sheet-overlay.open .sheet { animation: none; }

/* ===== HISTORY GROUP HEADER ===== */
.hist-group { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; padding: 12px 0 6px; border-top: 1px solid var(--border); }
.hist-group:first-child { border-top: none; }

/* ===== DIVIDER ===== */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ===== ALERT ===== */
.alert { padding: 10px 13px; border-radius: var(--r); font-size: 12px; margin-bottom: 10px; }
.alert-info { background: var(--accent-lt); color: #1e40af; }
.alert-warn { background: var(--amber-lt); color: var(--amber); }
.alert-success { background: var(--green-lt); color: var(--green); }

/* ===== DESKTOP NAV (≥600px) ===== */
@media (min-width: 600px) {
  body { background: #ebe8e0; }
  #app { flex-direction: row; max-width: 1100px; margin: 0 auto; min-height: 100vh; }
  #topbar { display: none !important; }
  #sidebar {
    width: 220px; flex-shrink: 0; position: sticky; top: 0; height: 100vh;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 24px 0;
  }
  .sidebar-logo { font-family: var(--mono); font-size: 18px; font-weight: 500; padding: 0 20px 24px; }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--r); border: none; background: none;
    font-size: 14px; font-weight: 500; font-family: 'Noto Sans JP';
    color: var(--text2); cursor: pointer; transition: all .15s; text-align: left;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: var(--accent-lt); color: var(--accent); }
  .sidebar-item-icon { font-size: 17px; width: 24px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding: 0 10px; }
  .sidebar-user { padding: 12px; background: var(--surface2); border-radius: var(--r); font-size: 12px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #main-content { flex: 1; overflow-y: auto; padding-bottom: 0; }
  .page { padding: 24px; max-width: 680px; }
  #bottom-nav { display: none !important; }
  #topbar { display: none !important; }
  .hero-amount { font-size: 40px; }
}
@media (max-width: 599px) {
  #sidebar { display: none; }
  #topbar { display: flex !important; }
  #main-content { display: block; }
  #bottom-nav { display: flex !important; flex-direction: column; }
}
</style>
</head>
<body>

<!-- OFFLINE BANNER -->
<div id="offline-banner">オフライン中 — 最後に同期したデータを表示しています</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">money<span>.</span>log</div>
  <div class="auth-tagline">個人財務管理 — どこからでもアクセス</div>

        <div class="hero-sub-item"><div class="hero-sub-label">今月の支出</div><div class="hero-sub-value minus">-${fmt(expense)}</div></div>
        <div class="hero-sub-item"><div class="hero-sub-label">未払金</div><div class="hero-sub-value" style="color:#fbbf24">${fmt(unpaidTotal)}</div></div>

  setEl('dash-metrics', `
    <div class="metric-card">
      <div class="metric-label">次の入金まで</div>
      <div class="metric-value ${daysNext!==null&&daysNext<=5?'green':''}">${daysNext!==null?daysNext+'日':'--'}</div>
      <div class="metric-hint">${nextInc?sanitize(nextInc.name)+' '+fmt(nextInc.amount):'予定なし'}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">今月の収支</div>

  let accHtml = '';

  else accounts.forEach(a => {
    const chipClass = CHIP[a.type]||'chip-bank';
    const usedUnpaid = a.type==='card' ? unpaid.filter(u=>u.account_id===a.id).reduce((s,u)=>s+u.amount,0) : 0;
    const limitBar = a.type==='card'&&a.limit_amount ? (() => {
      const pct = Math.min(100, Math.round(usedUnpaid/a.limit_amount*100));
      const c = pct>80?'red':pct>50?'amber':'green';
      return `<div style="font-size:10px;color:var(--text3)">${fmt(usedUnpaid)} / ${fmt(a.limit_amount)}</div><div class="prog"><div class="prog-fill prog-${c}" style="width:${pct}%"></div></div>`;

        </div>

      <div class="acc-row-balance">${fmt(a.balance||0)}</div>
    </div>`;
  });
  setEl('dash-accounts', accHtml);

  // Upcoming (30 days)
  const in30 = new Date(); in30.setDate(in30.getDate()+30);
  const in30str = in30.toISOString().split('T')[0];
  const events = [];
  schedules.filter(s=>s.next_date>=today()&&s.next_date<=in30str).forEach(s=>{
    const d = Math.ceil((new Date(s.next_date)-now)/86400000);
    events.push({date:s.next_date,days:d,name:s.name,amount:s.amount,type:'income'});
  });
  unpaid.filter(u=>u.debit_date>=today()&&u.debit_date<=in30str).forEach(u=>{
    const acc = accounts.find(a=>a.id===u.account_id);
    const d = Math.ceil((new Date(u.debit_date)-now)/86400000);
    events.push({date:u.debit_date,days:d,name:(acc?sanitize(acc.name):'カード')+'引き落とし',amount:u.amount,type:'debit'});
  });
  events.sort((a,b)=>a.date.localeCompare(b.date));
  let upHtml = '';
  if(!events.length) upHtml='<div class="empty"><div class="empty-text">今後30日の予定なし</div></div>';

      <div class="upcoming-days">${dLabel}</div>
      <div class="upcoming-amount" style="color:${color}">${sign}${fmt(e.amount)}</div>
    </div>`;
  });
  setEl('dash-upcoming', upHtml);

  // Category breakdown
  const cats = {};
  txThisMonth.filter(t=>t.type==='expense').forEach(t=>{cats[t.category]=(cats[t.category]||0)+(t.amount||0);});
  const catEntries = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  let catHtml = '';
  if(!catEntries.length) catHtml='<div class="empty"><div class="empty-text">今月の支出データなし</div></div>';
  else catEntries.slice(0,6).forEach(([cat,amt])=>{

        </div>
        <div class="prog"><div class="prog-fill prog-blue" style="width:${pct}%"></div></div>
      </div>
      <div style="font-size:11px;color:var(--text3);width:30px;text-align:right">${pct}%</div>
    </div>`;
  });
  setEl('dash-cats', catHtml);

  // Recent transactions
  const recent = [...transactions].slice(0,8);
  let recHtml = '';
  if(!recent.length) recHtml='<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">取引を記録してください</div></div>';
  else recent.forEach(t=>{
    const sign=t.type==='income'?'+':'-';
    const cls=t.type==='income'?'plus':'minus';
    const details = t.transaction_details||[];
    const payLabel = details.map(d=>{const a=accounts.find(x=>x.id===d.account_id);return a?sanitize(a.name):'?';}).join('＋');
    recHtml+=`<div class="list-item">
      <div class="item-icon">${CAT_ICO[t.category]||'📋'}</div>
      <div class="item-body"><div class="item-name">${sanitize(t.memo||'（摘要なし）')}</div><div class="item-sub">${fmtDate(t.date)} ${sanitize(t.category||'')}${payLabel?' ・'+payLabel:''}</div></div>
      <div class="item-right"><div class="item-amount ${cls}">${sign}${fmt(t.amount)}</div></div>
    </div>`;
  });
  setEl('dash-recent', recHtml);
}

async function saveTransactionCore(tx, splits) {
  const { data: { user } } = await supabase.auth.getUser();
  // Insert transaction
  const { data: txData, error: txErr } = await supabase
    .from('transactions')
    .insert({ ...tx, user_id: user.id })
    .select().single();
  if (txErr) { toast('エラー: '+txErr.message); return; }

  // Insert details
  if (splits.length > 0) {
    const details = splits.map(s=>({ transaction_id: txData.id, account_id: s.accountId, amount: s.amount }));
    await supabase.from('transaction_details').insert(details);
  }

  // Update balances & handle unpaid
  for (const sp of splits) {
    const acc = state.accounts.find(a=>a.id===sp.accountId);
    if (!acc) continue;
    if (tx.type === 'expense') {
      if (acc.type === 'card') {
        const debitDate = getNextDebitDate(acc);
        await supabase.from('unpaid').insert({ user_id: user.id, account_id: acc.id, amount: sp.amount, memo: tx.memo||'（摘要なし）', transaction_date: tx.date, debit_date: debitDate });
      } else {
        await supabase.from('accounts').update({ balance: (acc.balance||0)-sp.amount }).eq('id', acc.id);
      }
    } else if (tx.type === 'income') {
      await supabase.from('accounts').update({ balance: (acc.balance||0)+sp.amount }).eq('id', acc.id);
    }
  }
}

function getNextDebitDate(acc) {
  const day = acc.debit_day || 27;
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth()+1, day).toISOString().split('T')[0];
}

window.settleCard = async () => {
  const id = getVal('settle-card');
  const debitDate = getVal('settle-date');
  const toSettle = state.unpaid.filter(u=>u.account_id===id&&u.debit_date<=debitDate);
  if (!toSettle.length) { toast('該当する未払金がありません'); return; }
  const total = toSettle.reduce((s,u)=>s+u.amount,0);
  const bank = state.accounts.find(a=>a.type==='bank'||a.type==='cash');
  if (!bank) { toast('銀行/現金口座が見つかりません'); return; }
  if (!confirm(`${fmt(total)}を${bank.name}から引き落とし処理しますか？`)) return;
  await supabase.from('accounts').update({ balance: (bank.balance||0)-total }).eq('id', bank.id);
  for (const u of toSettle) await supabase.from('unpaid').delete().eq('id', u.id);
  const { data: { user } } = await supabase.auth.getUser();
  const acc = state.accounts.find(a=>a.id===id);
  await supabase.from('transactions').insert({ user_id: user.id, date: debitDate, amount: total, memo: (acc?acc.name:'カード')+'引き落とし', category:'その他', type:'expense' });
  await loadAll();
  populateSettleCard();
  renderDashboard();
  toast('引き落とし処理完了 ✓');
};

    html+=`<div class="list-item">
      <div class="item-icon">💰</div>

function renderSimulation() {
  const { schedules, accounts } = state;
  const liquid = accounts.filter(a=>a.type!=='card').reduce((s,a)=>s+(a.balance||0),0);
  const future = schedules.filter(s=>s.next_date>=today()).sort((a,b)=>a.next_date.localeCompare(b.next_date));
  if (!future.length) { setEl('sim-list','<div style="font-size:13px;color:var(--text3)">登録済みの入金予定なし</div>'); return; }
  let running = liquid;
  let html = `<div class="sim-row"><span class="sim-name" style="color:var(--text3)">現在残高</span><div class="sim-right"><div class="sim-total">${fmt(running)}</div></div></div>`;
  future.slice(0,6).forEach(s=>{
    running += s.amount;
    html+=`<div class="sim-row">
      <div class="sim-name">${sanitize(s.name)} (${fmtDate(s.next_date)})</div>
      <div class="sim-right"><div class="sim-delta">+${fmt(s.amount)}</div><div class="sim-total">${fmt(running)}</div></div>
    </div>`;
  });
  setEl('sim-list', html);
}

window.receiveSchedule = async (id) => {
  const s = state.schedules.find(x=>x.id===id);
  if (!s) return;
  const acc = state.accounts.find(a=>a.id===s.account_id);
  if (!acc) { toast('口座が見つかりません'); return; }
  const { data: { user } } = await supabase.auth.getUser();
  // Update balance
  await supabase.from('accounts').update({ balance: (acc.balance||0)+s.amount }).eq('id', acc.id);
  // Record income transaction
  await supabase.from('transactions').insert({ user_id: user.id, date: today(), amount: s.amount, memo: s.name, category:'収入', type:'income' });
  // Handle repeat
  if (s.repeat_type === 'none') {
    await supabase.from('schedules').delete().eq('id', id);
  } else {
    const d = new Date(s.next_date+'T00:00:00');
    if (s.repeat_type==='monthly') d.setMonth(d.getMonth()+1);
    else if (s.repeat_type==='bimonthly') d.setMonth(d.getMonth()+2);
    else if (s.repeat_type==='yearly') d.setFullYear(d.getFullYear()+1);
    await supabase.from('schedules').update({ next_date: d.toISOString().split('T')[0] }).eq('id', id);
  }
  await loadAll();
  renderSchedule();
  renderDashboard();
  toast(`${fmt(s.amount)}を受取済みとして記録しました ✓`);
};

window.deleteSchedule = async (id) => {
  if (!confirm('削除しますか？')) return;
  await supabase.from('schedules').delete().eq('id', id);
  await loadAll();
  renderSchedule();
};

// =====================================================
// CALENDAR
// =====================================================
function renderCalendar() {
  const { calYear: y, calMonth: m } = state;
  const { transactions, schedules, unpaid } = state;
  document.getElementById('cal-label').textContent = `${y}年 ${m+1}月`;
  const dayHeaders = ['日','月','火','水','木','金','土'];
  setEl('cal-head', dayHeaders.map(d=>`<div>${d}</div>`).join(''));
  const first = new Date(y, m, 1);
  const last = new Date(y, m+1, 0);
  const todayStr = today();
  let html = '';
  for (let i=0;i<first.getDay();i++) html+=`<div class="cal-cell other"></div>`;
  for (let d=1;d<=last.getDate();d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT = ds===todayStr;
    const txIncome = transactions.filter(t=>t.date===ds&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const txExpense = transactions.filter(t=>t.date===ds&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const hasSch = schedules.some(s=>s.next_date===ds);
    const hasDebit = unpaid.some(u=>u.debit_date===ds);
    let evs='';
    if(txIncome>0) evs+=`<div class="cal-ev cal-ev-income">+${fmt(txIncome)}</div>`;
    if(txExpense>0) evs+=`<div class="cal-ev cal-ev-expense">-${fmt(txExpense)}</div>`;
    if(hasSch) evs+=`<div class="cal-ev cal-ev-income">入金予定</div>`;
    if(hasDebit) evs+=`<div class="cal-ev cal-ev-card">引落</div>`;
    html+=`<div class="cal-cell ${isT?'today':''}"><div class="cal-num">${d}</div>${evs}</div>`;
  }
  setEl('cal-grid', html);
}

window.changeMonth = (delta) => {
  state.calMonth += delta;
  if (state.calMonth>11){state.calMonth=0;state.calYear++;}
  if (state.calMonth<0){state.calMonth=11;state.calYear--;}
  renderCalendar();
};

// =====================================================
// HISTORY
// =====================================================
function renderHistory() {
  const { transactions, accounts } = state;
  const filterMonth = getVal('filter-month');
  const filterType = getVal('filter-type');
  const months = [...new Set(transactions.map(t=>t.date.slice(0,7)))].sort().reverse();
  const sel = document.getElementById('filter-month');
  if (sel) {
    const prev = sel.value;
    sel.innerHTML = '<option value="">全期間</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');
    sel.value = prev;
  }
  let filtered = [...transactions];
  if (filterMonth) filtered = filtered.filter(t=>t.date.startsWith(filterMonth));
  if (filterType) filtered = filtered.filter(t=>t.type===filterType);
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  let html='';
  if (!filtered.length) html='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">該当する取引なし</div></div>';
  let lastMonth='';
  filtered.forEach(t=>{
    const m=t.date.slice(0,7);
    if(m!==lastMonth){html+=`<div class="hist-group">${m}</div>`;lastMonth=m;}
    const sign=t.type==='income'?'+':'-';
    const cls=t.type==='income'?'plus':'minus';
    const details=t.transaction_details||[];
    const pay=details.map(d=>{const a=accounts.find(x=>x.id===d.account_id);return a?sanitize(a.name):'?';}).join('＋');
    html+=`<div class="list-item">
      <div class="item-icon">${CAT_ICO[t.category]||'📋'}</div>
      <div class="item-body">
        <div class="item-name">${sanitize(t.memo||'（摘要なし）')}</div>
        <div class="item-sub">${t.date} ${sanitize(t.category||'')}${pay?' ・'+pay:''}</div>
      </div>
      <div class="item-right" style="display:flex;align-items:center;gap:6px">
        <div><div class="item-amount ${cls}">${sign}${fmt(t.amount)}</div></div>
        <button class="btn btn-sm btn-danger" onclick="deleteTx('${t.id}')">×</button>
      </div>
    </div>`;
  });
  setEl('history-list', html);
}

window.deleteTx = async (id) => {
  if (!confirm('この取引を削除しますか？（残高の自動調整はされません）')) return;
  await supabase.from('transactions').delete().eq('id', id);
  await loadAll();
  renderHistory();
  toast('削除しました');
};

// =====================================================
// REALTIME (Supabase channels)
// =====================================================
function setupRealtime() {
  supabase.channel('global')
    .on('postgres_changes',{event:'*',schema:'public',table:'accounts'},async()=>{ await loadAll(); if(currentPage==='dashboard')renderDashboard(); if(currentPage==='accounts')renderAccounts(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},async()=>{ await loadAll(); if(currentPage==='dashboard')renderDashboard(); if(currentPage==='history')renderHistory(); })
    .subscribe();
}
let currentPage = 'dashboard';
const origSwitchPage = window.switchPage;
window.switchPage = (page, btn) => { currentPage = page; origSwitchPage(page, btn); };

// =====================================================
// INIT
// =====================================================
supabase.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    state.user = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const emailEl = document.getElementById('sidebar-user-email');
    if (emailEl) emailEl.textContent = session.user.email;
    await loadAll();
    renderDashboard();
    renderQuickAdd();
    setupRealtime();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// URL shortcut handling
const urlParams = new URLSearchParams(location.search);
if (urlParams.get('page') === 'quick-add') {
  window.addEventListener('load', () => setTimeout(()=>openQuickSheet(), 500));
}

// Offline detection
window.addEventListener('offline', () => { document.getElementById('offline-banner').style.display='block'; });
window.addEventListener('online', async () => {
  document.getElementById('offline-banner').style.display='none';
  await loadAll();
  renderPage(currentPage);
  toast('オンラインに戻りました — データを同期しました');
});

// PWA Service Worker 登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(e=>console.warn('SW registration failed:', e));
  }
})();
</script>
